name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Deploy only for: a manual dispatch, OR a successful CI run that came from a
    # real push to THIS repo's main (not a pull_request, incl. a fork PR whose
    # head branch is literally named "main"). The branches filter above matches
    # workflow_run.head_branch, so the event/repository guards here are what
    # actually prevent a fork PR from deploying attacker code with repo secrets.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.event == 'push' &&
           github.event.workflow_run.head_branch == 'main' &&
           github.event.workflow_run.head_repository.full_name == github.repository) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Vendor wordlist
        run: |
          test -f crates/core/data/bip39-japanese.txt || \
            curl -fsSL https://raw.githubusercontent.com/bitcoin/bips/master/bip-0039/japanese.txt \
              -o crates/core/data/bip39-japanese.txt
      - name: Build web (includes wasm)
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm build
      - name: Ensure Pages project exists
        run: npx --yes wrangler@3 pages project create open-secret-memo --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --branch=main forces a PRODUCTION deploy. The checkout above uses
          # `ref: head_sha` (the CI-validated commit), which leaves git in a
          # DETACHED HEAD; without an explicit branch, wrangler can't detect the
          # production branch and would publish a preview deployment instead.
          command: pages deploy web/dist --project-name=open-secret-memo --branch=main
